<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient: deep plum → rich indigo → dark aubergine -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0818"/>
      <stop offset="45%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#160824"/>
    </linearGradient>

    <!-- Glow for nodes — rose/coral -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff4d8f;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#ff4d8f;stop-opacity:0"/>
    </radialGradient>

    <!-- Central orb gradient: magenta → amber → gold -->
    <radialGradient id="orbGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" style="stop-color:#ff9de2"/>
      <stop offset="35%" style="stop-color:#e0457b"/>
      <stop offset="70%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#f5c518"/>
    </radialGradient>

    <!-- Subtle map/grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>

    <!-- Text glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Orange glow for orb -->
    <filter id="orbGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Layered sunset horizon glow — crimson → amber → violet -->
  <ellipse cx="300" cy="660" rx="560" ry="220" fill="#e0457b" opacity="0.18"/>
  <ellipse cx="180" cy="640" rx="380" ry="160" fill="#f97316" opacity="0.13"/>
  <ellipse cx="950" cy="680" rx="420" ry="200" fill="#7c3aed" opacity="0.14"/>

  <!-- === RIGHT SIDE — Agent Network Visualization === -->

  <!-- Outer ring faint arcs -->
  <circle cx="840" cy="315" r="230" fill="none" stroke="#e0457b" stroke-width="0.7" opacity="0.22" stroke-dasharray="8 6"/>
  <circle cx="840" cy="315" r="170" fill="none" stroke="#f97316" stroke-width="0.5" opacity="0.18" stroke-dasharray="4 8"/>

  <!-- Connection lines (spokes from center to satellite nodes) -->
  <line x1="840" y1="315" x2="840" y2="110" stroke="#f97316" stroke-width="1.2" opacity="0.4"/>
  <line x1="840" y1="315" x2="1030" y2="200" stroke="#e0457b" stroke-width="1.2" opacity="0.4"/>
  <line x1="840" y1="315" x2="1060" y2="340" stroke="#f97316" stroke-width="1.2" opacity="0.4"/>
  <line x1="840" y1="315" x2="980" y2="480" stroke="#e0457b" stroke-width="1.2" opacity="0.4"/>
  <line x1="840" y1="315" x2="700" y2="490" stroke="#f97316" stroke-width="1.2" opacity="0.4"/>
  <line x1="840" y1="315" x2="630" y2="200" stroke="#e0457b" stroke-width="1.2" opacity="0.4"/>

  <!-- Inter-satellite lines (subtle teal mesh) -->
  <line x1="840" y1="110" x2="1030" y2="200" stroke="#00d2c8" stroke-width="0.8" opacity="0.22"/>
  <line x1="1030" y1="200" x2="1060" y2="340" stroke="#00d2c8" stroke-width="0.8" opacity="0.22"/>
  <line x1="1060" y1="340" x2="980" y2="480" stroke="#00d2c8" stroke-width="0.8" opacity="0.22"/>
  <line x1="980" y1="480" x2="700" y2="490" stroke="#00d2c8" stroke-width="0.8" opacity="0.22"/>
  <line x1="700" y1="490" x2="630" y2="200" stroke="#00d2c8" stroke-width="0.8" opacity="0.22"/>
  <line x1="630" y1="200" x2="840" y2="110" stroke="#00d2c8" stroke-width="0.8" opacity="0.22"/>

  <!-- Satellite node glows -->
  <circle cx="840" cy="110" r="30" fill="url(#nodeGlow)"/>
  <circle cx="1030" cy="200" r="30" fill="url(#nodeGlow)"/>
  <circle cx="1060" cy="340" r="30" fill="url(#nodeGlow)"/>
  <circle cx="980" cy="480" r="30" fill="url(#nodeGlow)"/>
  <circle cx="700" cy="490" r="30" fill="url(#nodeGlow)"/>
  <circle cx="630" cy="200" r="30" fill="url(#nodeGlow)"/>

  <!-- Satellite nodes — outer ring -->
  <circle cx="840" cy="110" r="11" fill="#1f0a2e" stroke="#f97316" stroke-width="2"/>
  <circle cx="1030" cy="200" r="11" fill="#1f0a2e" stroke="#e0457b" stroke-width="2"/>
  <circle cx="1060" cy="340" r="11" fill="#1f0a2e" stroke="#f97316" stroke-width="2"/>
  <circle cx="980" cy="480" r="11" fill="#1f0a2e" stroke="#e0457b" stroke-width="2"/>
  <circle cx="700" cy="490" r="11" fill="#1f0a2e" stroke="#f97316" stroke-width="2"/>
  <circle cx="630" cy="200" r="11" fill="#1f0a2e" stroke="#e0457b" stroke-width="2"/>

  <!-- Satellite node labels -->
  <text x="840" y="94" text-anchor="middle" font-family="monospace" font-size="9" fill="#f97316" opacity="0.85">Indeed</text>
  <text x="1048" y="186" text-anchor="start" font-family="monospace" font-size="9" fill="#e0457b" opacity="0.85">LinkedIn</text>
  <text x="1075" y="345" text-anchor="start" font-family="monospace" font-size="9" fill="#f97316" opacity="0.85">Glassdoor</text>
  <text x="990" y="500" text-anchor="middle" font-family="monospace" font-size="9" fill="#00d2c8" opacity="0.85">Nova Act</text>
  <text x="670" y="510" text-anchor="middle" font-family="monospace" font-size="9" fill="#00d2c8" opacity="0.85">Nova Sonic</text>
  <text x="598" y="194" text-anchor="end" font-family="monospace" font-size="9" fill="#00d2c8" opacity="0.85">Nova Lite</text>

  <!-- Central orb glow halo -->
  <circle cx="840" cy="315" r="80" fill="#e0457b" opacity="0.09"/>
  <circle cx="840" cy="315" r="62" fill="#f97316" opacity="0.11"/>

  <!-- Central orb -->
  <circle cx="840" cy="315" r="46" fill="url(#orbGrad)" filter="url(#orbGlow)"/>
  <circle cx="840" cy="315" r="46" fill="none" stroke="#ff9de2" stroke-width="2" opacity="0.6"/>

  <!-- Orb inner icon: simplified bolt/lightning representing automation -->
  <polyline points="845,298 836,315 844,315 835,333" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- === LEFT SIDE — Typography === -->

  <!-- Eyebrow label -->
  <text x="80" y="168" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="4" fill="#f97316" opacity="0.9" text-transform="uppercase">AMAZON NOVA HACKATHON 2026</text>

  <!-- Main title: AutoApply — gradient fill via linearGradient -->
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9de2"/>
      <stop offset="50%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#f5c518"/>
    </linearGradient>
    <linearGradient id="ruleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0457b"/>
      <stop offset="100%" style="stop-color:#f5c518;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <text x="76" y="270" font-family="'Segoe UI', Arial, sans-serif" font-size="88" font-weight="800" fill="url(#titleGrad)" filter="url(#shadow)" letter-spacing="-2">AutoApply</text>

  <!-- Subtitle line -->
  <text x="80" y="318" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="400" fill="#e8c8f0" letter-spacing="0.5" opacity="0.9">AI-Powered Job Application Agent</text>

  <!-- Horizontal rule -->
  <rect x="80" y="342" width="480" height="2" rx="1" fill="url(#ruleGrad)"/>

  <!-- Description / tagline -->
  <text x="80" y="380" font-family="'Segoe UI', Arial, sans-serif" font-size="16.5" fill="#d4b8e8" opacity="0.9">Parallel search · Intelligent matching · Voice interview coaching</text>
  <text x="80" y="404" font-family="'Segoe UI', Arial, sans-serif" font-size="16.5" fill="#d4b8e8" opacity="0.9">Giving every candidate the same unfair advantage.</text>

  <!-- Technology pills — jewel tones on plum base -->
  <!-- Nova Act: emerald teal -->
  <rect x="80" y="438" width="106" height="28" rx="14" fill="#06201e" stroke="#00d2c8" stroke-width="1.5" opacity="0.95"/>
  <text x="133" y="456" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="#00d2c8">Nova Act</text>

  <!-- Nova 2 Lite: electric violet -->
  <rect x="197" y="438" width="116" height="28" rx="14" fill="#1a0a30" stroke="#a855f7" stroke-width="1.5" opacity="0.95"/>
  <text x="255" y="456" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="#c084fc">Nova 2 Lite</text>

  <!-- Nova 2 Sonic: hot rose -->
  <rect x="324" y="438" width="128" height="28" rx="14" fill="#25071a" stroke="#e0457b" stroke-width="1.5" opacity="0.95"/>
  <text x="388" y="456" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="#f472b6">Nova 2 Sonic</text>

  <!-- Amazon Bedrock: warm amber -->
  <rect x="463" y="438" width="148" height="28" rx="14" fill="#211005" stroke="#f97316" stroke-width="1.5" opacity="0.95"/>
  <text x="537" y="456" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="#fb923c">Amazon Bedrock</text>

  <!-- Hashtag bottom-left -->
  <text x="80" y="590" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#f97316" opacity="0.85" letter-spacing="1">#AmazonNova</text>

  <!-- Bottom right: builder.aws.com watermark -->
  <text x="1120" y="590" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#9d7ab8" opacity="0.7">builder.aws.com</text>

  <!-- Top-right decorative corner dots -->
  <circle cx="1160" cy="40" r="3" fill="#e0457b" opacity="0.5"/>
  <circle cx="1140" cy="40" r="2" fill="#f97316" opacity="0.4"/>
  <circle cx="1160" cy="20" r="2" fill="#a855f7" opacity="0.4"/>

  <!-- Animated pulse ring on central orb (CSS animation) -->
  <style>
    @keyframes pulse {
      0%   { r: 50; opacity: 0.25; }
      70%  { r: 90; opacity: 0;    }
      100% { r: 90; opacity: 0;    }
    }
    #pulse1 { animation: pulse 3s ease-out infinite; }
    #pulse2 { animation: pulse 3s ease-out 1.5s infinite; }
  </style>
  <circle id="pulse1" cx="840" cy="315" r="50" fill="none" stroke="#e0457b" stroke-width="1.5"/>
  <circle id="pulse2" cx="840" cy="315" r="50" fill="none" stroke="#f97316" stroke-width="1"/>
</svg>
